<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Car Rental | فخامة القيادة</title>
<style>
/* التنسيق العام - لمسة فخامة داكنة */
body {
font-family: 'Segoe UI', sans-serif;
background-color: #0f0f0f;
color: #e0e0e0;
margin: 0;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
}

.container {
width: 90%;
max-width: 900px;
text-align: center;
}

.card {
background: #1a1a1a;
padding: 40px;
border-radius: 20px;
box-shadow: 0 15px 35px rgba(0,0,0,0.7);
border: 1px solid #333;
}

h1, h2 { color: #daa520; }

input, select, button {
width: 100%;
padding: 15px;
margin: 10px 0;
border-radius: 8px;
border: 1px solid #444;
background: #252525;
color: white;
font-size: 16px;
}

button {
background: linear-gradient(45deg, #daa520, #b8860b);
color: black;
font-weight: bold;
cursor: pointer;
border: none;
transition: 0.3s;
}

button:hover { transform: scale(1.02); opacity: 0.9; }

/* معرض السيارات */
.grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 20px;
margin-top: 20px;
}

.car-item {
background: #252525;
padding: 20px;
border-radius: 15px;
border: 1px solid #daa520;
cursor: pointer;
}

.car-item:hover { background: #333; }

.hidden { display: none; }

.form-section { text-align: right; }
</style>
</head>
<body>

<div class="container">

<div id="step1" class="card">
<h1>مرحباً بك في أسطول الفخامة</h1>
<p>أدخل بريدك الإلكتروني لاستكشاف السيارات المتاحة</p>
<input type="email" id="email" placeholder="البريد الإلكتروني" required>
<button onclick="goToStep2()">استكشاف السيارات</button>
</div>

<div id="step2" class="card hidden">
<h2>اختر سيارة أحلامك</h2>
<p>سواء كنت عريساً أو تبحث عن هيبة الحضور، اختر فخامتك الآن:</p>
<div class="grid">
<div class="car-item" onclick="goToStep3('بورش - Porsche')">
<h3>Porsche</h3>
<p>أداء رياضي لا يضاهى</p>
</div>
<div class="car-item" onclick="goToStep3('بي إم دبليو - BMW')">
<h3>BMW</h3>
<p>متعة القيادة والأناقة</p>
</div>
<div class="car-item" onclick="goToStep3('مرسيدس - Mercedes')">
<h3>Mercedes</h3>
<p>خيار العرسان الأول</p>
</div>
</div>
</div>

<div id="step3" class="card hidden form-section">
<h2>إكمال بيانات الحجز</h2>
<p id="selectedCar" style="color: #daa520; text-align: center; font-weight: bold;"></p>

<form action="https://formspree.io/f/your-email" method="POST">
<input type="hidden" name="السيارة_المختارة" id="carInput">

<label>الاسم الكامل:</label>
<input type="text" name="الاسم" required>

<label>العمر:</label>
<input type="number" name="العمر" min="18" required>

<label>رقم الهاتف:</label>
<input type="tel" name="الهاتف" required>

<label>الولاية (58 ولاية):</label>
<select name="الولاية" id="states"></select>

<label>لون السيارة:</label>
<input type="text" name="اللون" placeholder="مثلاً: أسود ملكي">

<label>مدة الحجز (بالأيام):</label>
<input type="number" name="المدة" min="1" required>

<label>هل تريد سائقاً؟</label>
<select name="سائق">
<option value="مع سائق">نعم - خدمة VIP (سعر مرتفع)</option>
<option value="بدون سائق">لا - قيادة شخصية (سعر في المتناول)</option>
</select>

<button type="submit">إرسال الطلب الآن</button>
<button type="button" onclick="backToStep2()" style="background: #444; color: white; margin-top: 5px;">رجوع</button>
</form>
</div>

</div>

<script>
function goToStep2() {
const email = document.getElementById('email').value;
if(email) {
document.getElementById('step1').classList.add('hidden');
document.getElementById('step2').classList.remove('hidden');
} else {
alert("من فضلك أدخل بريدك الإلكتروني أولاً");
}
}

function goToStep3(carName) {
document.getElementById('carInput').value = carName;
document.getElementById('selectedCar').innerText = "السيارة المختارة: " + carName;
document.getElementById('step2').classList.add('hidden');
document.getElementById('step3').classList.remove('hidden');
}

function backToStep2() {
document.getElementById('step3').classList.add('hidden');
document.getElementById('step2').classList.remove('hidden');
}

// إضافة 58 ولاية
const states = ["أدرار","الشلف","الأغواط","أم البواقي","باتنة","بجاية","بسكرة","بشار","البليدة","البويرة","تمنراست","تبسة","تلمسان","تيارت","تيزي وزو","الجزائر","الجلفة","جيجل","سطيف","سعيدة","سكيكدة","سيدي بلعباس","عنابة","قالمة","قسنطينة","المدية","مستغانم","المسيلة","معسكر","ورقلة","وهران","البيض","إليزي","برج بوعريريج","الطارف","تندوف","تيسمسيلت","الوادي","خنشلة","سوق أهراس","تيبازة","ميلة","عين الدفلى","النعامة","عين تموشنت","غرداية","غليزان","تيميمون","برج باجي مختار","أولاد جلال","بني عباس","إن صالح","إن قزام","تقرت","جانت","المغير","المنيعة"];
const select = document.getElementById('states');
states.forEach((state, i) => {
let opt = document.createElement('option');
opt.value = state;
opt.innerHTML = (i+1) + " - " + state;
select.appendChild(opt);
});
</script>
</body>
</html>
